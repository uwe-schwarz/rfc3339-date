name: Publish Scalar Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run checks
      - name: Detect OpenAPI changes
        id: openapi_changes
        run: |
          if ! git rev-parse HEAD^ >/dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet HEAD^ HEAD -- docs/openapi.yaml docs/openapi.json docs/openapi.scalar.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - run: node scripts/publish-scalar.mjs
        if: steps.openapi_changes.outputs.changed == 'true'
        env:
          SCALAR_TOKEN: ${{ secrets.SCALAR_TOKEN }}
          SCALAR_AGENT_KEY: ${{ secrets.SCALAR_AGENT_KEY }}
      - name: Skip Scalar publish
        if: steps.openapi_changes.outputs.changed != 'true'
        run: echo "Skipping Scalar publish because docs/openapi artifacts did not change in this commit."
